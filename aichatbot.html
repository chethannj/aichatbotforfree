<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI Chatbot — ChethanAIChronicles</title>
<style>
:root {
  --bg: #0D0D1A;
  --card: #13131F;
  --card2: #1A1A2E;
  --border: #252540;
  --accent: #7B61FF;
  --accent2: #A593FF;
  --teal: #00C9A7;
  --text: #F0EFFF;
  --muted: #3E3C60;
  --muted2: #8E8CB0;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 16px;
}

/* ── Main Container ── */
.chat-container {
  width: 100%;
  max-width: 780px;
  height: 92vh;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 20px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  box-shadow: 0 0 80px #7B61FF18;
}

/* ── Header ── */
.chat-header {
  background: var(--card2);
  border-bottom: 1px solid var(--border);
  padding: 14px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  flex-shrink: 0;
}
.header-left { display: flex; align-items: center; gap: 12px; }
.avatar {
  width: 42px; height: 42px;
  border-radius: 50%;
  background: linear-gradient(135deg, #7B61FF, #00C9A7);
  display: flex; align-items: center;
  justify-content: center;
  font-size: 20px; flex-shrink: 0;
}
.bot-name { font-size: 15px; font-weight: 700; }
.bot-status {
  font-size: 11px; color: var(--teal);
  display: flex; align-items: center; gap: 5px;
  margin-top: 2px;
}
.status-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--teal);
  animation: pulse 2s infinite;
}

/* ── Model Selector ── */
.model-wrap { display: flex; align-items: center; gap: 8px; }
.model-label {
  font-size: 10px; letter-spacing: 1px;
  text-transform: uppercase; color: var(--muted2);
}
.model-select {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 6px 10px;
  font-size: 12px;
  color: var(--text);
  outline: none;
  cursor: pointer;
  transition: border-color 0.2s;
}
.model-select:focus { border-color: var(--accent); }

/* ── Messages Area ── */
.messages {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 14px;
  scroll-behavior: smooth;
}
.messages::-webkit-scrollbar { width: 4px; }
.messages::-webkit-scrollbar-track { background: transparent; }
.messages::-webkit-scrollbar-thumb {
  background: var(--border);
  border-radius: 2px;
}

/* ── Message Bubbles ── */
.message {
  display: flex;
  gap: 10px;
  max-width: 88%;
  animation: fadeIn 0.25s ease;
}
.message.user {
  align-self: flex-end;
  flex-direction: row-reverse;
}
.msg-avatar {
  width: 32px; height: 32px;
  border-radius: 50%;
  background: var(--card2);
  border: 1px solid var(--border);
  display: flex; align-items: center;
  justify-content: center;
  font-size: 15px; flex-shrink: 0;
  margin-top: 2px;
}
.message.user .msg-avatar {
  background: linear-gradient(135deg, #7B61FF, #A593FF);
  border-color: transparent;
}
.msg-bubble {
  background: var(--card2);
  border: 1px solid var(--border);
  border-radius: 16px 16px 16px 4px;
  padding: 12px 16px;
  font-size: 14px;
  line-height: 1.65;
  color: #C4C2E8;
}
.message.user .msg-bubble {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
  border-radius: 16px 16px 4px 16px;
}
.msg-bubble code {
  background: rgba(0,0,0,0.3);
  border-radius: 4px;
  padding: 2px 6px;
  font-family: 'Courier New', monospace;
  font-size: 12px;
}
.msg-bubble pre {
  background: rgba(0,0,0,0.3);
  border-radius: 8px;
  padding: 12px;
  overflow-x: auto;
  margin-top: 8px;
  font-size: 12px;
  font-family: 'Courier New', monospace;
  line-height: 1.6;
}
.msg-time {
  font-size: 10px;
  color: var(--muted2);
  margin-top: 4px;
  text-align: right;
}
.message.user .msg-time { text-align: left; }

/* ── Typing Indicator ── */
.typing-wrap {
  display: flex; gap: 10px;
  align-items: flex-start;
}
.typing {
  display: none;
  gap: 5px;
  padding: 14px 18px;
  background: var(--card2);
  border: 1px solid var(--border);
  border-radius: 16px 16px 16px 4px;
  align-items: center;
}
.typing.show { display: flex; }
.typing-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--accent);
  animation: bounce 1.2s infinite;
}
.typing-dot:nth-child(2) { animation-delay: 0.2s; }
.typing-dot:nth-child(3) { animation-delay: 0.4s; }

/* ── System Prompt Bar ── */
.system-bar {
  background: var(--bg);
  border-top: 1px solid var(--border);
  padding: 10px 20px;
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}
.system-label {
  font-size: 10px; letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--muted2); white-space: nowrap;
}
.system-input {
  flex: 1;
  background: var(--card2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 7px 12px;
  font-size: 12px;
  color: var(--text);
  outline: none;
  font-family: inherit;
  transition: border-color 0.2s;
}
.system-input:focus { border-color: var(--accent); }

/* ── Input Area ── */
.input-area {
  background: var(--card2);
  border-top: 1px solid var(--border);
  padding: 14px 16px;
  display: flex;
  gap: 10px;
  align-items: flex-end;
  flex-shrink: 0;
}
.input-box {
  flex: 1;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 12px 16px;
  font-size: 14px;
  color: var(--text);
  font-family: inherit;
  resize: none;
  min-height: 48px;
  max-height: 140px;
  outline: none;
  line-height: 1.5;
  transition: border-color 0.2s;
}
.input-box:focus { border-color: var(--accent); }
.input-box::placeholder { color: var(--muted); }

.btn-row {
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.send-btn {
  width: 48px; height: 48px;
  border-radius: 12px;
  background: var(--accent);
  border: none;
  color: #fff;
  font-size: 18px;
  cursor: pointer;
  display: flex; align-items: center;
  justify-content: center;
  transition: background 0.2s, transform 0.1s;
  flex-shrink: 0;
}
.send-btn:hover { background: #6A52EE; }
.send-btn:active { transform: scale(0.95); }
.send-btn:disabled { background: var(--border); cursor: not-allowed; }

.clear-btn {
  width: 48px; height: 32px;
  border-radius: 8px;
  background: transparent;
  border: 1px solid var(--border);
  color: var(--muted2);
  font-size: 11px;
  cursor: pointer;
  transition: all 0.2s;
  display: flex; align-items: center;
  justify-content: center;
}
.clear-btn:hover { border-color: var(--accent2); color: var(--accent2); }

/* ── Stats Bar ── */
.stats-bar {
  background: var(--bg);
  border-top: 1px solid var(--border);
  padding: 6px 20px;
  display: flex;
  align-items: center;
  gap: 16px;
  flex-shrink: 0;
}
.stat {
  font-size: 10px; color: var(--muted2);
  display: flex; align-items: center; gap: 4px;
}
.stat span { color: var(--accent2); }

/* ── Welcome Message ── */
.welcome {
  text-align: center;
  padding: 32px 20px;
  color: var(--muted2);
}
.welcome h2 {
  font-size: 20px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 8px;
}
.welcome p { font-size: 13px; line-height: 1.7; margin-bottom: 16px; }
.suggestion-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 8px;
  max-width: 500px;
  margin: 0 auto;
}
.suggestion {
  background: var(--card2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px 12px;
  font-size: 12px;
  color: var(--muted2);
  cursor: pointer;
  text-align: left;
  transition: border-color 0.2s, color 0.2s;
  line-height: 1.5;
}
.suggestion:hover { border-color: var(--accent); color: var(--text); }

/* ── Error Toast ── */
.toast {
  position: fixed;
  bottom: 20px; left: 50%;
  transform: translateX(-50%);
  background: #FF4444;
  color: #fff;
  padding: 10px 20px;
  border-radius: 8px;
  font-size: 13px;
  display: none;
  z-index: 999;
  max-width: 360px;
  text-align: center;
}
.toast.show { display: block; animation: slideUp 0.3s ease; }

/* ── Animations ── */
@keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.3} }
@keyframes bounce {
  0%,60%,100%{transform:translateY(0)}
  30%{transform:translateY(-6px)}
}
@keyframes fadeIn {
  from{opacity:0;transform:translateY(8px)}
  to{opacity:1;transform:translateY(0)}
}
@keyframes slideUp {
  from{opacity:0;transform:translateX(-50%) translateY(10px)}
  to{opacity:1;transform:translateX(-50%) translateY(0)}
}

/* ── Responsive ── */
@media(max-width:560px) {
  .model-wrap { display: none; }
  .system-bar { display: none; }
  .chat-container { height: 100vh; border-radius: 0; }
  .suggestion-grid { grid-template-columns: 1fr 1fr; }
}
</style>
</head>
<body>

<div class="chat-container">

  <!-- Header -->
  <div class="chat-header">
    <div class="header-left">
      <div class="avatar">🤖</div>
      <div>
        <div class="bot-name">ChethanAI Assistant</div>
        <div class="bot-status">
          <span class="status-dot"></span>
          <span id="status-text">Ready · Powered by Groq</span>
        </div>
      </div>
    </div>
    <div class="model-wrap">
      <span class="model-label">Model</span>
      <select class="model-select" id="modelSelect">
        <option value="llama-3.3-70b-versatile">Llama 3.3 70B · Best</option>
        <option value="llama-3.1-8b-instant">Llama 3.1 8B · Fastest</option>
        <option value="llama-4-scout-17b-16e-instruct">Llama 4 Scout · Latest</option>
        <option value="mixtral-8x7b-32768">Mixtral 8x7B · Long ctx</option>
        <option value="gemma2-9b-it">Gemma 2 9B · Google</option>
      </select>
    </div>
  </div>

  <!-- Messages -->
  <div class="messages" id="messages">
    <div class="welcome" id="welcome">
      <h2>👋 Hi! I'm your AI Assistant</h2>
      <p>Built with Groq's ultra-fast LLM API.<br/>
      Ask me anything — I respond in milliseconds.</p>
      <div class="suggestion-grid">
        <button class="suggestion" onclick="useSuggestion(this)">What is prompt engineering?</button>
        <button class="suggestion" onclick="useSuggestion(this)">Explain RAG in simple terms</button>
        <button class="suggestion" onclick="useSuggestion(this)">Write a Python hello world</button>
        <button class="suggestion" onclick="useSuggestion(this)">Top AI tools for creators</button>
      </div>
    </div>
    <div class="typing-wrap" id="typing-wrap" style="display:none;">
      <div class="msg-avatar">🤖</div>
      <div class="typing" id="typing">
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
      </div>
    </div>
  </div>

  <!-- System Prompt Bar -->
  <div class="system-bar">
    <span class="system-label">Personality</span>
    <input
      type="text"
      class="system-input"
      id="systemPrompt"
      value="You are a helpful, friendly AI assistant for ChethanAIChronicles — a YouTube channel about AI tools and development. Be concise, clear, and enthusiastic about AI."
      placeholder="Type your bot's personality here..."
    />
  </div>

  <!-- Input Area -->
  <div class="input-area">
    <textarea
      class="input-box"
      id="userInput"
      placeholder="Type a message... (Enter to send, Shift+Enter for new line)"
      rows="1"
    ></textarea>
    <div class="btn-row">
      <button class="send-btn" id="sendBtn" onclick="sendMessage()" title="Send">➤</button>
      <button class="clear-btn" onclick="clearChat()" title="Clear chat">✕</button>
    </div>
  </div>

  <!-- Stats Bar -->
  <div class="stats-bar">
    <div class="stat">Messages: <span id="msgCount">0</span></div>
    <div class="stat">Tokens used: <span id="tokenCount">0</span></div>
    <div class="stat">Avg speed: <span id="avgSpeed">—</span></div>
    <div class="stat" style="margin-left:auto;">
      <span style="color:#00C9A7;">● Groq LPU</span>
    </div>
  </div>

</div>

<!-- Error Toast -->
<div class="toast" id="toast"></div>

<script>
// ════════════════════════════════════════════
//  CONFIGURATION — EDIT THIS SECTION
// ════════════════════════════════════════════

const GROQ_API_KEY = '<PUT YOUR GROQ API KEY HERE>';
// Get your FREE key at: https://console.groq.com
// No credit card required!

// ════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════

let conversationHistory = [];
let totalTokens = 0;
let messageCount = 0;
let totalTime = 0;
let responseCount = 0;

// ════════════════════════════════════════════
//  SEND MESSAGE
// ════════════════════════════════════════════

async function sendMessage() {
  const input     = document.getElementById('userInput');
  const sendBtn   = document.getElementById('sendBtn');
  const userText  = input.value.trim();
  const model     = document.getElementById('modelSelect').value;
  const sysPrompt = document.getElementById('systemPrompt').value.trim();

  if (!userText) return;
  if (!GROQ_API_KEY || GROQ_API_KEY === 'YOUR-GROQ-API-KEY-HERE') {
    showToast('⚠️ Please add your Groq API key in the code (line 1 of the script)');
    return;
  }

  // Hide welcome, show user message
  hideWelcome();
  addMessage(userText, 'user');
  input.value = '';
  autoResize(input);
  sendBtn.disabled = true;

  // Add to history
  conversationHistory.push({ role: 'user', content: userText });

  // Show typing
  showTyping(true);
  setStatus('Thinking...');

  const startTime = Date.now();

  try {
    const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${GROQ_API_KEY}`
      },
      body: JSON.stringify({
        model: model,
        max_tokens: 2048,
        temperature: 0.7,
        messages: [
          { role: 'system', content: sysPrompt || 'You are a helpful assistant.' },
          ...conversationHistory
        ]
      })
    });

    const data = await response.json();

    if (!response.ok) {
      throw new Error(data.error?.message || `API Error ${response.status}`);
    }

    const elapsed   = ((Date.now() - startTime) / 1000).toFixed(1);
    const botReply  = data.choices[0].message.content;
    const tokens    = data.usage?.total_tokens || 0;
    const tps       = data.usage?.completion_tokens
                        ? Math.round(data.usage.completion_tokens / (elapsed || 1))
                        : null;

    // Add to history
    conversationHistory.push({ role: 'assistant', content: botReply });

    // Update UI
    showTyping(false);
    addMessage(botReply, 'bot', elapsed, tps);

    // Update stats
    totalTokens  += tokens;
    messageCount += 1;
    totalTime    += parseFloat(elapsed);
    responseCount++;
    updateStats();

    setStatus(`Ready · ${model.split('-').slice(0,2).join(' ')}`);

  } catch (err) {
    showTyping(false);
    showToast('❌ ' + (err.message || 'Something went wrong. Check your API key.'));
    conversationHistory.pop(); // remove the failed user message
    setStatus('Error — check API key');
    console.error(err);
  }

  sendBtn.disabled = false;
  input.focus();
}

// ════════════════════════════════════════════
//  ADD MESSAGE TO UI
// ════════════════════════════════════════════

function addMessage(text, sender, elapsed, tps) {
  const messages    = document.getElementById('messages');
  const typingWrap  = document.getElementById('typing-wrap');

  const now = new Date();
  const timeStr = now.toLocaleTimeString('en-IN', { hour:'2-digit', minute:'2-digit' });

  let speedBadge = '';
  if (elapsed && tps) {
    speedBadge = `<div class="msg-time">${timeStr} · ${elapsed}s · ${tps} tok/s ⚡</div>`;
  } else if (elapsed) {
    speedBadge = `<div class="msg-time">${timeStr} · ${elapsed}s</div>`;
  } else {
    speedBadge = `<div class="msg-time">${timeStr}</div>`;
  }

  const div = document.createElement('div');
  div.className = `message ${sender}`;
  div.innerHTML = `
    <div class="msg-avatar">${sender === 'user' ? '👤' : '🤖'}</div>
    <div>
      <div class="msg-bubble">${formatText(text)}</div>
      ${speedBadge}
    </div>
  `;

  messages.insertBefore(div, typingWrap);
  messages.scrollTop = messages.scrollHeight;
}

// ════════════════════════════════════════════
//  FORMAT TEXT (basic markdown)
// ════════════════════════════════════════════

function formatText(text) {
  return text
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    // Code blocks
    .replace(/```(\w+)?\n?([\s\S]*?)```/g, '<pre><code>$2</code></pre>')
    // Inline code
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    // Bold
    .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
    // Italic
    .replace(/\*([^*]+)\*/g, '<em>$1</em>')
    // New lines
    .replace(/\n/g, '<br/>');
}

// ════════════════════════════════════════════
//  HELPERS
// ════════════════════════════════════════════

function showTyping(show) {
  const wrap = document.getElementById('typing-wrap');
  const dots = document.getElementById('typing');
  wrap.style.display = show ? 'flex' : 'none';
  if (show) dots.classList.add('show');
  else dots.classList.remove('show');
  const messages = document.getElementById('messages');
  messages.scrollTop = messages.scrollHeight;
}

function hideWelcome() {
  const w = document.getElementById('welcome');
  if (w) w.remove();
}

function setStatus(text) {
  document.getElementById('status-text').textContent = text;
}

function updateStats() {
  document.getElementById('msgCount').textContent = messageCount;
  document.getElementById('tokenCount').textContent = totalTokens.toLocaleString();
  if (responseCount > 0) {
    document.getElementById('avgSpeed').textContent =
      (totalTime / responseCount).toFixed(1) + 's';
  }
}

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 4000);
}

function clearChat() {
  conversationHistory = [];
  totalTokens = 0;
  messageCount = 0;
  totalTime = 0;
  responseCount = 0;
  updateStats();
  const messages = document.getElementById('messages');
  messages.innerHTML = `
    <div class="welcome" id="welcome">
      <h2>👋 Chat cleared!</h2>
      <p>Start a fresh conversation below.</p>
      <div class="suggestion-grid">
        <button class="suggestion" onclick="useSuggestion(this)">What is prompt engineering?</button>
        <button class="suggestion" onclick="useSuggestion(this)">Explain RAG in simple terms</button>
        <button class="suggestion" onclick="useSuggestion(this)">Write a Python hello world</button>
        <button class="suggestion" onclick="useSuggestion(this)">Top AI tools for creators</button>
      </div>
    </div>
    <div class="typing-wrap" id="typing-wrap" style="display:none;">
      <div class="msg-avatar">🤖</div>
      <div class="typing" id="typing">
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
      </div>
    </div>
  `;
  setStatus('Ready · Powered by Groq');
}

function useSuggestion(btn) {
  document.getElementById('userInput').value = btn.textContent;
  sendMessage();
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 140) + 'px';
}

// ════════════════════════════════════════════
//  EVENT LISTENERS
// ════════════════════════════════════════════

document.getElementById('userInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

document.getElementById('userInput').addEventListener('input', function() {
  autoResize(this);
});
</script>
</body>
</html>
